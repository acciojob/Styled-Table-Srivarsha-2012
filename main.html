<!DOCTYPE html>
<html>
<head>
    <title>Game Statistics</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        table{
            width: 60%;
            margin: 50px auto;
            border-collapse: collapse;
            background-color: white;
        }

        thead{
            background-color: #4CAF50;
            color: white;
        }

        th, td{
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        tbody tr:nth-child(even){
            background-color: #f9f9f9;
        }

        tbody tr:hover{
            background-color: #e0f7fa;
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">Football Player Statistics</h2>

    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>Matches</th>
                <th>Goals</th>
                <th>Assists</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Player A</td>
                <td>25</td>
                <td>18</td>
                <td>10</td>
            </tr>

            <tr>
                <td>Player B</td>
                <td>22</td>
                <td>15</td>
                <td>7</td>
            </tr>

            <tr>
                <td>Player C</td>
                <td>20</td>
                <td>12</td>
                <td>9</td>
            </tr>

            <tr>
                <td>Player D</td>
                <td>18</td>
                <td>10</td>
                <td>5</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
